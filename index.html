<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <title>Estar longde de você......</title>
</head>
<body>
    <div class="box">
        <div class="header">
            <h1>💖🌺🌸🌹💖<br>A distancia não me tira a vontade de estar contigo, 
                apenas me faz imaginar com anseio o dia em que finalmente estivermos juntos.<br>🌺🌸🌹💖💖</h1>
            <div class="header-images">
                <img src="img/minhaDeusa.jpeg" alt="Imagem circular 1">
                <img src="img/nos.jpeg" alt="Imagem circular 2">
                <img src="img/nosso-milk-shake.jpeg" alt="Imagem circular 3">
            </div>
        </div>
    </div>
    <!-- Player de áudio (tenta autoplay; se bloqueado, mostra botão para o usuário) -->
    <script>
        (function(){
            const audio = document.createElement('audio');
            audio.id = 'bg-audio';
            audio.src = 'audio/te-esperando.mp4'; // coloque seu arquivo em audio/music.mp3 ou altere para uma URL
            audio.loop = true;
            audio.preload = 'auto';
            audio.volume = 0.8;
            audio.style.display = 'none';
            document.body.appendChild(audio);

            function showPlayButton(){
                if (document.getElementById('play-audio-btn')) return;
                const btn = document.createElement('button');
                btn.id = 'play-audio-btn';
                btn.textContent = 'Clique para ouvir música';
                Object.assign(btn.style, {
                    position: 'fixed',
                    bottom: '16px',
                    right: '16px',
                    padding: '8px 12px',
                    zIndex: 9999,
                    cursor: 'pointer'
                });
                btn.addEventListener('click', function(){
                    audio.play().catch(()=>{});
                    btn.style.display = 'none';
                });
                document.body.appendChild(btn);
            }

            function tryPlay(){
                const p = audio.play();
                if (p !== undefined) {
                    p.catch(() => {
                        showPlayButton();
                    });
                }
            }

            window.addEventListener('load', tryPlay);
            // Em caso de interação do usuário, tenta tocar novamente (alguns navegadores liberam após qualquer click)
            ['click','touchstart','keydown'].forEach(evt => {
                window.addEventListener(evt, function once(){
                    if (audio.paused) audio.play().catch(()=>{});
                    window.removeEventListener(evt, once);
                });
            });
        })();
    </script>
</body>
</html>
